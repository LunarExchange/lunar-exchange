name: 📊 Monitoring & Health Checks

on:
  schedule:
    - cron: '0 */12 * * *' # Every 12 hours
  workflow_dispatch:

jobs:
  # Health check
  health-check:
    name: 🏥 Health Check
    runs-on: ubuntu-latest
    steps:
      - name: Check production site
        id: health
        run: |
          echo "### 🏥 Health Check Results" >> $GITHUB_STEP_SUMMARY
          
          # Check main site
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://lunarexchange.github.io/lunar-exchange || echo "000")
          
          echo "✅ Site URL: https://lunarexchange.github.io/lunar-exchange" >> $GITHUB_STEP_SUMMARY
          echo "📊 Status code: $STATUS" >> $GITHUB_STEP_SUMMARY
          echo "⏱️ Timestamp: $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY

      - name: Check response time
        run: |
          RESPONSE_TIME=$(curl -o /dev/null -s -w '%{time_total}\n' https://lunarexchange.github.io/lunar-exchange || echo "0")
          echo "⏱️ Response time: ${RESPONSE_TIME}s" >> $GITHUB_STEP_SUMMARY

  # Dependency check
  dependency-health:
    name: 📦 Dependency Health
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Check for outdated packages
        run: |
          npm outdated || true
          echo "### 📦 Dependency Status" >> $GITHUB_STEP_SUMMARY
          echo "Dependency check completed" >> $GITHUB_STEP_SUMMARY

      - name: Security audit
        run: |
          npm audit --audit-level=moderate || true
          echo "Security audit completed" >> $GITHUB_STEP_SUMMARY

  # Performance monitoring
  performance-monitoring:
    name: ⚡ Performance Monitoring
    runs-on: ubuntu-latest
    steps:
      - name: Measure load time
        run: |
          echo "### ⚡ Performance Metrics" >> $GITHUB_STEP_SUMMARY
          
          START_TIME=$(date +%s%N)
          curl -s -o /dev/null https://lunarexchange.github.io/lunar-exchange || true
          END_TIME=$(date +%s%N)
          
          LOAD_TIME=$(( ($END_TIME - $START_TIME) / 1000000 ))
          echo "Load time: ${LOAD_TIME}ms" >> $GITHUB_STEP_SUMMARY

  # Monitoring report
  monitoring-report:
    name: 📈 Monitoring Report
    runs-on: ubuntu-latest
    needs: [health-check, dependency-health, performance-monitoring]
    if: always()
    steps:
      - name: Generate report
        run: |
          echo "# 📊 Monitoring Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## System Status" >> $GITHUB_STEP_SUMMARY
          echo "- 🏥 Health: ${{ needs.health-check.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- 📦 Dependencies: ${{ needs.dependency-health.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- ⚡ Performance: ${{ needs.performance-monitoring.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Timestamp: $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
