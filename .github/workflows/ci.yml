name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-build:
    name: 🧪 Test & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Run linting
        run: npm run lint
        continue-on-error: true

      - name: Run tests
        run: npm run test:ci
        env:
          CI: true
        continue-on-error: true

      - name: Build project
        run: npm run build
        env:
          NODE_ENV: production

      - name: Summary
        run: |
          echo "### ✅ CI Pipeline Complete" >> $GITHUB_STEP_SUMMARY
          echo "- Lint: Completed" >> $GITHUB_STEP_SUMMARY
          echo "- Test: Completed" >> $GITHUB_STEP_SUMMARY
          echo "- Build: Success" >> $GITHUB_STEP_SUMMARY
